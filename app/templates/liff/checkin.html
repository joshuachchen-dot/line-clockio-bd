<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Aiotek 打卡系統</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:      #000000;
      --grey-dark:  #333333;
      --grey-mid:   #555555;
      --grey-sub:   #6b7280;
      --grey-light: rgba(255,255,255,.3);
      --bg:         rgba(0,0,0,.05);
      --card:       rgba(255,255,255,.88);
      --text:       #111111;
      --radius:     8px;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", sans-serif;
      background: #000;
      color: var(--text);
      overscroll-behavior: none;
    }
    /* background-attachment:fixed is unreliable in iOS Safari / LINE WebView — use a
       fixed-position pseudo-element instead so the image never scrolls with content. */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(rgba(0,0,0,.38), rgba(0,0,0,.38)),
        #000 url('/static/bg.jpg') center 40% / auto 115% no-repeat;
    }

    /* ── App shell ──────────────────────────────────────────── */
    #app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .header {
      background: transparent;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 20px;
      flex-shrink: 0;
      position: relative;
      min-height: 52px;
    }
    .header-logo {
      height: 22px;
      width: auto;
      filter: invert(1);
      display: block;
    }
    .header-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
      display: none;
      text-shadow: 0 1px 4px rgba(0,0,0,.6);
    }
    .header-back {
      position: absolute; left: 16px;
      background: none; border: none; color: #fff;
      font-size: 22px; cursor: pointer; padding: 4px 8px;
      display: none;
      text-shadow: 0 1px 4px rgba(0,0,0,.6);
    }

    /* ── Scrollable content ──────────────────────────────────── */
    /* overflow-y:auto on all screens — background is position:fixed so no white space ever */
    .screen { flex: 1; min-height: 0; overflow-y: auto; padding: 16px; display: none; }
    .screen.active { display: block; }

    /* ── Home: datetime card ─────────────────────────────────── */
    .datetime-card {
      background: rgba(0,0,0,.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: var(--radius);
      color: #fff;
      text-align: center;
      padding: 24px 16px 20px;
      margin-bottom: 12px;
    }
    .dt-date { font-size: 14px; color: #aaaaaa; margin-bottom: 4px; }
    .dt-time {
      font-size: 56px; font-weight: 800; letter-spacing: 3px;
      color: #ffffff; line-height: 1;
      margin-bottom: 10px;
    }
    .dt-user { font-size: 13px; color: #aaaaaa; }

    /* ── Punch buttons ───────────────────────────────────────── */
    .punch-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .punch-btn {
      border: none; border-radius: var(--radius);
      padding: 18px 12px; cursor: pointer;
      font-size: 16px; font-weight: 700;
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      transition: opacity .15s, transform .1s;
    }
    .punch-btn:active { opacity: .75; transform: scale(.97); }
    .punch-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .punch-btn .btn-label { font-size: 18px; }
    .punch-btn .btn-time  { font-size: 13px; font-weight: 500; opacity: .85; }
    .btn-in  { background: rgba(255,255,255,.92); color: #111; }
    .btn-out { background: rgba(255,255,255,.65); color: #222; }
    .btn-in.done  { background: rgba(255,255,255,.45); color: #333; }
    .btn-out.done { background: rgba(255,255,255,.45); color: #333; }

    /* ── Section titles ──────────────────────────────────────── */
    .section-title {
      font-size: 12px; font-weight: 700; color: rgba(255,255,255,.75);
      margin: 4px 0 10px; letter-spacing: 1px;
      text-transform: uppercase;
    }
    .section-title.manager-label { color: rgba(255,255,255,.6); margin-top: 16px; }

    /* ── Feature grid ────────────────────────────────────────── */
    .feature-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .feature-item {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px 8px 14px;
      text-align: center;
      cursor: pointer;
      transition: box-shadow .15s, transform .1s;
      border: 1px solid rgba(255,255,255,.35);
      box-shadow: none;
      backdrop-filter: blur(4px);
    }
    .feature-item:active { transform: scale(.95); box-shadow: 0 0 0 2px var(--black); }
    .feature-icon { display: flex; justify-content: center; margin-bottom: 8px; color: var(--text); }
    .feature-label { font-size: 13px; font-weight: 600; color: var(--text); }

    /* ── Manager section ─────────────────────────────────────── */
    .manager-btn {
      width: 100%;
      background: var(--card);
      border: 1px solid rgba(255,255,255,.35);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: opacity .15s;
      backdrop-filter: blur(4px);
    }
    .manager-btn:active { opacity: .75; }
    .manager-btn-left { display: flex; align-items: center; gap: 12px; }
    .manager-btn-icon { display: flex; align-items: center; color: var(--text); }
    .manager-btn-label { font-size: 16px; font-weight: 700; color: var(--text); }
    .pending-badge {
      background: var(--black); color: #fff;
      border-radius: 100px; padding: 3px 11px;
      font-size: 13px; font-weight: 700;
      display: none;
    }

    /* ── Records screen ──────────────────────────────────────── */
    .month-title {
      font-size: 16px; font-weight: 700;
      text-align: center; margin-bottom: 14px;
      color: rgba(255,255,255,.9); text-shadow: 0 1px 2px rgba(0,0,0,.3);
    }
    .record-list { display: flex; flex-direction: column; gap: 8px; }
    .record-item {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid rgba(255,255,255,.35);
      backdrop-filter: blur(4px);
    }
    .record-left { display: flex; align-items: center; gap: 12px; }
    .record-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-in  { background: var(--black); }
    .dot-out { background: var(--grey-mid); }
    .record-date { font-size: 13px; color: var(--grey-sub); }
    .record-type { font-size: 15px; font-weight: 600; }
    .record-time { font-size: 16px; font-weight: 700; color: var(--text); }
    .record-punch-row { display: flex; gap: 14px; margin-top: 6px; }
    .record-punch { font-size: 14px; color: var(--grey-sub); }
    .record-punch span { font-weight: 700; color: var(--text); }
    .ot-tag {
      display: inline-block; margin-top: 6px;
      background: rgba(0,0,0,.1); color: var(--grey-dark);
      border: 1px solid rgba(0,0,0,.15);
      border-radius: 4px; padding: 2px 10px;
      font-size: 12px; font-weight: 600;
    }
    .ot-tag.legal-exceeded {
      background: rgba(0,0,0,.15); color: var(--black);
      border-color: rgba(0,0,0,.25);
    }
    .ot-monthly-banner {
      background: var(--card);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 12px;
      display: flex; align-items: center; justify-content: space-between;
      border: 1px solid rgba(255,255,255,.35);
      backdrop-filter: blur(4px);
    }
    .ot-monthly-label { font-size: 13px; color: var(--grey-sub); font-weight: 500; }
    .ot-monthly-value { font-size: 15px; font-weight: 700; color: var(--text); }
    .ot-monthly-banner.over-limit .ot-monthly-label { color: var(--black); font-weight: 700; }
    .ot-monthly-banner.over-limit .ot-monthly-value { color: var(--black); }

    /* ── Makeup request form ─────────────────────────────────── */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: 13px; font-weight: 700;
      color: rgba(255,255,255,.85); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .form-input {
      width: 100%; padding: 12px 14px;
      border-radius: var(--radius); border: 1.5px solid rgba(255,255,255,.4);
      font-size: 16px; background: rgba(255,255,255,.9); color: var(--text);
      outline: none; appearance: none;
    }
    .form-input:focus { border-color: var(--black); }
    .form-textarea {
      width: 100%; padding: 12px 14px;
      border-radius: var(--radius); border: 1.5px solid rgba(255,255,255,.4);
      font-size: 15px; background: rgba(255,255,255,.9); color: var(--text);
      height: 100px; resize: none; outline: none;
    }
    .form-textarea:focus { border-color: var(--black); }
    .radio-row { display: flex; gap: 24px; }
    .radio-row label {
      font-size: 15px; font-weight: 500; color: rgba(255,255,255,.85);
      display: flex; align-items: center; gap: 7px; cursor: pointer;
    }
    .submit-btn {
      width: 100%; padding: 16px; border-radius: var(--radius);
      background: var(--black); color: #fff;
      font-size: 16px; font-weight: 700; border: none; cursor: pointer;
      margin-top: 8px; transition: opacity .15s;
      letter-spacing: 0.5px;
    }
    .submit-btn:active { opacity: .75; }

    /* ── Manager review cards ────────────────────────────────── */
    .review-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      border: 1px solid rgba(255,255,255,.35);
      backdrop-filter: blur(4px);
    }
    .review-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 8px;
    }
    .review-name { font-size: 16px; font-weight: 700; }
    .type-badge {
      padding: 3px 10px; border-radius: 4px;
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .badge-in  { background: #111; color: #fff; }
    .badge-out { background: #555; color: #fff; }
    .review-time {
      display: flex; align-items: center; gap: 5px;
      font-size: 14px; color: var(--grey-sub); margin-bottom: 8px;
    }
    .review-reason {
      display: flex; align-items: flex-start; gap: 6px;
      font-size: 14px; color: var(--text);
      background: rgba(0,0,0,.05); border-radius: var(--radius);
      padding: 8px 12px; margin-bottom: 12px;
      border: 1px solid rgba(0,0,0,.08);
    }
    .meta-icon {
      display: inline-flex; align-items: center; flex-shrink: 0;
      position: relative; top: 1px; color: var(--grey-sub);
    }
    .review-actions { display: flex; gap: 10px; }
    .btn-approve, .btn-reject {
      flex: 1; padding: 12px; border-radius: var(--radius);
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: opacity .15s;
    }
    .btn-approve { background: var(--black); color: #fff; border: none; }
    .btn-reject  { background: rgba(0,0,0,.06); color: var(--grey-dark); border: 1.5px solid rgba(0,0,0,.15); }
    .btn-approve:active, .btn-reject:active { opacity: .75; }

    /* ── Empty / loading state ───────────────────────────────── */
    .empty-state {
      text-align: center; color: rgba(255,255,255,.7);
      padding: 40px 0; font-size: 15px;
    }

    /* ── Loading overlay ─────────────────────────────────────── */
    #loading-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(255,255,255,.25);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-msg { color: #fff; font-size: 15px; }

    /* ── Toast ───────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      background: var(--black); color: #fff;
      padding: 12px 24px; border-radius: 100px;
      font-size: 14px; font-weight: 500;
      opacity: 0; transition: opacity .3s;
      pointer-events: none; z-index: 200; white-space: nowrap;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="header">
    <button class="header-back" id="btn-back" onclick="goBack()">‹</button>
    <img class="header-logo" id="header-logo" src="/static/aiotek-logo.png" alt="AIOTEK">
    <span class="header-title" id="header-title"></span>
  </div>

  <!-- ── Home screen ───────────────────────────────────────── -->
  <div class="screen active" id="screen-home">

    <div class="datetime-card">
      <div class="dt-date" id="dt-date">----年--月--日 星期-</div>
      <div class="dt-time" id="dt-time">--:--</div>
      <div class="dt-user" id="dt-user">載入中…</div>
    </div>

    <div class="punch-row">
      <button class="punch-btn btn-in"  id="btn-in"  onclick="doPunch('clock_in')">
        <span class="btn-label">上班打卡</span>
        <span class="btn-time"  id="in-time">──</span>
      </button>
      <button class="punch-btn btn-out" id="btn-out" onclick="doPunch('clock_out')">
        <span class="btn-label">下班打卡</span>
        <span class="btn-time"  id="out-time">──</span>
      </button>
    </div>

    <div class="section-title">個人專區</div>
    <div class="feature-grid">
      <button class="feature-item" onclick="showRecords()">
        <div class="feature-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <path d="M16 2v4M8 2v4M3 10h18"/>
            <circle cx="8"  cy="14" r="1" fill="currentColor" stroke="none"/>
            <circle cx="12" cy="14" r="1" fill="currentColor" stroke="none"/>
            <circle cx="16" cy="14" r="1" fill="currentColor" stroke="none"/>
            <circle cx="8"  cy="18" r="1" fill="currentColor" stroke="none"/>
            <circle cx="12" cy="18" r="1" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        <div class="feature-label">出勤紀錄</div>
      </button>
      <button class="feature-item" onclick="showMakeupForm()">
        <div class="feature-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
            <line x1="8" y1="13" x2="16" y2="13"/>
            <line x1="8" y1="17" x2="13" y2="17"/>
          </svg>
        </div>
        <div class="feature-label">補打卡</div>
      </button>
    </div>

    <!-- Profile button -->
    <button class="manager-btn" style="margin-top:10px" onclick="showProfile()">
      <div class="manager-btn-left">
        <div class="manager-btn-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <div class="manager-btn-label">個人資料</div>
      </div>
      <div id="card-badge" style="display:none;background:#d97706;color:#fff;border-radius:100px;padding:3px 11px;font-size:13px;font-weight:700;">設定卡號</div>
    </button>

    <!-- Manager section (hidden until is_manager confirmed) -->
    <div id="manager-section" style="display:none">
      <div class="section-title manager-label">管理員專區</div>
      <button class="manager-btn" onclick="showMakeupReview()">
        <div class="manager-btn-left">
          <div class="manager-btn-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
              <rect x="9" y="3" width="6" height="4" rx="1"/>
              <path d="M9 12l2 2 4-4"/>
            </svg>
          </div>
          <div class="manager-btn-label">補打卡審核</div>
        </div>
        <div class="pending-badge" id="pending-badge">0</div>
      </button>
    </div>

  </div>

  <!-- ── Records screen ───────────────────────────────────── -->
  <div class="screen" id="screen-records">
    <div class="month-title" id="records-month"></div>
    <div id="ot-monthly-banner" style="display:none" class="ot-monthly-banner">
      <div class="ot-monthly-label">本月加班累計</div>
      <div class="ot-monthly-value" id="ot-monthly-value">—</div>
    </div>
    <div class="record-list" id="record-list"></div>
  </div>

  <!-- ── Makeup request form (employee) ───────────────────── -->
  <div class="screen" id="screen-makeup-form">
    <div class="form-group">
      <label class="form-label">日期</label>
      <input class="form-input" type="date" id="makeup-date">
    </div>
    <div class="form-group">
      <label class="form-label">時間</label>
      <input class="form-input" type="time" id="makeup-time">
    </div>
    <div class="form-group">
      <label class="form-label">類型</label>
      <div class="radio-row">
        <label><input type="radio" name="makeup-type" value="clock_in" checked> 上班打卡</label>
        <label><input type="radio" name="makeup-type" value="clock_out"> 下班打卡</label>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">原因 <span style="color:rgba(255,255,255,.5);font-weight:400;text-transform:none">(最多 500 字)</span></label>
      <textarea class="form-textarea" id="makeup-reason" placeholder="請說明補打卡原因…" maxlength="500"></textarea>
    </div>
    <button class="submit-btn" onclick="submitMakeupRequest()">送出申請</button>
  </div>

  <!-- ── Manager review screen ────────────────────────────── -->
  <div class="screen" id="screen-makeup-review">
    <div id="review-list"></div>
  </div>

  <!-- ── Profile screen ───────────────────────────────────── -->
  <div class="screen" id="screen-profile">
    <div class="form-group">
      <label class="form-label">姓名</label>
      <div id="profile-name" class="form-input" style="background:rgba(255,255,255,.55);color:#555;cursor:default;">—</div>
    </div>
    <div class="form-group">
      <label class="form-label">員工卡號 <span style="color:rgba(255,255,255,.5);font-weight:400;text-transform:none">(8 碼英數字)</span></label>
      <input class="form-input" type="text" id="profile-card"
             maxlength="8" placeholder="尚未設定"
             style="text-transform:uppercase;letter-spacing:2px;">
    </div>
    <button class="submit-btn" id="card-save-btn" onclick="submitCardNumber()">儲存卡號</button>
  </div>


</div>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div id="loading-msg">正在取得位置資訊…</div>
</div>

<!-- Confirm dialog -->
<div id="confirm-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150;align-items:center;justify-content:center;padding:24px;">
  <div style="background:#fff;border-radius:12px;padding:24px;width:100%;max-width:320px;text-align:center;">
    <div id="confirm-msg" style="font-size:15px;font-weight:600;color:#111;margin-bottom:20px;line-height:1.6;"></div>
    <div style="display:flex;gap:10px;">
      <button id="confirm-cancel" style="flex:1;padding:13px;border-radius:8px;background:rgba(0,0,0,.06);color:#555;font-size:15px;font-weight:700;border:1.5px solid rgba(0,0,0,.15);cursor:pointer;">取消</button>
      <button id="confirm-ok" style="flex:1;padding:13px;border-radius:8px;background:#111;color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;">確定</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
  const LIFF_ID  = {{ liff_id | tojson }};
  const API_BASE = {{ app_base_url | tojson }};

  let idToken   = null;
  let isManager = false;
  let _prevScreen = "screen-home";
  let _cardNumber = null;
  let _clockInTimestamp = null;

  // ── Inline SVG icons (used in JS-rendered templates) ──────
  const SVG_CAL_SM  = `<svg class="meta-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>`;
  const SVG_CHAT_SM = `<svg class="meta-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
  const SVG_OK  = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:6px;flex-shrink:0"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-5"/></svg>`;
  const SVG_ERR = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:6px;flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`;
  const SVG_WARN= `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:6px;flex-shrink:0"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;

  // ── XSS escape helper ─────────────────────────────────────
  function esc(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // ── Clock ──────────────────────────────────────────────────
  const DAYS = ["日","一","二","三","四","五","六"];
  function updateClock() {
    const now = new Date();
    document.getElementById("dt-time").textContent =
      now.toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit", hour12: false });
    document.getElementById("dt-date").textContent =
      `${now.getFullYear()}年${String(now.getMonth()+1).padStart(2,"0")}月` +
      `${String(now.getDate()).padStart(2,"0")}日 星期${DAYS[now.getDay()]}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── Navigation ─────────────────────────────────────────────
  function showScreen(id, title, showBack) {
    _prevScreen = document.querySelector(".screen.active")?.id || "screen-home";
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    const isHome = id === "screen-home";
    document.getElementById("header-logo").style.display = isHome ? "block" : "none";
    document.getElementById("header-title").style.display = isHome ? "none" : "block";
    document.getElementById("header-title").textContent = title;
    document.getElementById("btn-back").style.display = showBack ? "block" : "none";
  }
  function goBack() {
    showScreen("screen-home", "", false);
  }
  function showHome() { showScreen("screen-home", "", false); }

  // ── Records ────────────────────────────────────────────────
  function fmtOt(minutes) {
    if (minutes <= 0) return null;
    const h = Math.floor(minutes / 60);
    const m = minutes % 60;
    return h > 0 ? (m > 0 ? `加班 ${h}h${m}m` : `加班 ${h}h`) : `加班 ${m}m`;
  }

  async function showRecords() {
    showScreen("screen-records", "出勤紀錄", true);
    document.getElementById("record-list").innerHTML =
      '<div class="empty-state">載入中…</div>';
    document.getElementById("ot-monthly-banner").style.display = "none";
    try {
      const data = await apiPost("/liff/records", { id_token: idToken });
      document.getElementById("records-month").textContent = data.month;

      // Monthly OT banner
      const banner = document.getElementById("ot-monthly-banner");
      if (data.total_ot_counted_minutes > 0) {
        const h = Math.floor(data.total_ot_counted_minutes / 60);
        const m = data.total_ot_counted_minutes % 60;
        const label = h > 0 ? (m > 0 ? `${h} 小時 ${m} 分` : `${h} 小時`) : `${m} 分`;
        document.getElementById("ot-monthly-value").textContent = label;
        banner.className = "ot-monthly-banner" + (data.exceeds_monthly_limit ? " over-limit" : "");
        banner.querySelector(".ot-monthly-label").textContent =
          data.exceeds_monthly_limit ? "⚠️ 已超過月加班上限（46 小時）" : "本月加班累計";
        banner.style.display = "flex";
      }

      const list = document.getElementById("record-list");
      if (!data.records.length) {
        list.innerHTML = '<div class="empty-state">本月尚無打卡紀錄</div>';
        return;
      }

      list.innerHTML = data.records.map(r => {
        const otLabel = fmtOt(r.ot_counted_minutes);
        const otHtml = r.exceeds_legal_limit
          ? `<div><span class="ot-tag legal-exceeded">⚠️ 超過法定上限</span></div>`
          : otLabel
            ? `<div><span class="ot-tag">${esc(otLabel)}</span></div>`
            : "";
        const punchIn  = r.clock_in  ? `上班 <span>${esc(r.clock_in)}</span>`  : "上班 <span>—</span>";
        const punchOut = r.in_progress
          ? "下班 <span>上班中</span>"
          : r.clock_out ? `下班 <span>${esc(r.clock_out)}</span>` : "下班 <span>—</span>";
        return `
        <div class="record-item" style="flex-direction:column;align-items:flex-start;">
          <div style="display:flex;justify-content:space-between;width:100%;align-items:center;">
            <div>
              <div class="record-date">${esc(r.date)} 星期${esc(r.weekday)}</div>
            </div>
            <div class="record-time">${r.work_minutes > 0 ? Math.floor(r.work_minutes/60) + "h" + (r.work_minutes%60 > 0 ? (r.work_minutes%60) + "m" : "") : (r.in_progress ? "上班中" : "—")}</div>
          </div>
          <div class="record-punch-row">
            <div class="record-punch">${punchIn}</div>
            <div class="record-punch">${punchOut}</div>
          </div>
          ${otHtml}
        </div>`;
      }).join("");
    } catch {
      document.getElementById("record-list").innerHTML =
        '<div class="empty-state">載入失敗，請重試</div>';
    }
  }

  // ── Makeup form (employee) ─────────────────────────────────
  function showMakeupForm() {
    const today = new Date().toISOString().split("T")[0];
    document.getElementById("makeup-date").max   = today;
    document.getElementById("makeup-date").value = today;
    document.getElementById("makeup-time").value = "";
    document.getElementById("makeup-reason").value = "";
    document.querySelector('input[name="makeup-type"][value="clock_in"]').checked = true;
    showScreen("screen-makeup-form", "補打卡申請", true);
  }

  async function submitMakeupRequest() {
    const date   = document.getElementById("makeup-date").value;
    const time   = document.getElementById("makeup-time").value;
    const type   = document.querySelector('input[name="makeup-type"]:checked').value;
    const reason = document.getElementById("makeup-reason").value.trim();

    if (!date || !time) { toast(`${SVG_WARN} 請填寫日期和時間`); return; }
    if (!reason)        { toast(`${SVG_WARN} 請填寫補打卡原因`); return; }

    const dt = new Date(`${date}T${time}:00`);
    if (dt > new Date()) { toast(`${SVG_WARN} 補打卡時間不能是未來時間`); return; }

    const submitBtn = document.querySelector("#screen-makeup-form .submit-btn");
    if (submitBtn.disabled) return;
    submitBtn.disabled = true;
    setLoading(true, "正在送出申請…");
    try {
      await apiPost("/liff/makeup/request", {
        id_token: idToken,
        type,
        requested_at: dt.toISOString(),
        reason,
      });
      setLoading(false);
      submitBtn.disabled = false;
      toast(`${SVG_OK} 申請已送出，等候管理員審核`);
      showHome();
    } catch (e) {
      setLoading(false);
      submitBtn.disabled = false;
      toast(`${SVG_ERR} ${esc(e.detail||"送出失敗，請重試")}`, 3500);
    }
  }

  // ── Manager review ─────────────────────────────────────────
  async function showMakeupReview() {
    showScreen("screen-makeup-review", "補打卡審核", true);
    document.getElementById("review-list").innerHTML =
      '<div class="empty-state">載入中…</div>';
    try {
      const data = await apiPost("/liff/makeup/pending", { id_token: idToken });
      const list = document.getElementById("review-list");
      if (!data.requests.length) {
        list.innerHTML = '<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:0 auto 12px;opacity:.6"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-5"/></svg>目前沒有待審核的申請</div>';
        return;
      }
      list.innerHTML = data.requests.map(r => `
        <div class="review-card" id="review-card-${r.id}">
          <div class="review-header">
            <span class="review-name">${esc(r.employee_name)}</span>
            <span class="type-badge ${r.type === "clock_in" ? "badge-in" : "badge-out"}">${esc(r.type_label)}打卡</span>
          </div>
          <div class="review-time">${SVG_CAL_SM} ${esc(r.requested_at)}</div>
          <div class="review-reason">${SVG_CHAT_SM} ${esc(r.reason)}</div>
          <div class="review-actions">
            <button class="btn-approve" onclick="reviewRequest(${r.id},'approve',this)">✓ 核准</button>
            <button class="btn-reject"  onclick="reviewRequest(${r.id},'reject',this)">✕ 拒絕</button>
          </div>
        </div>`).join("");
    } catch {
      document.getElementById("review-list").innerHTML =
        '<div class="empty-state">載入失敗，請重試</div>';
    }
  }

  async function reviewRequest(id, action, btnEl) {
    // Disable both action buttons immediately to prevent double-submit before overlay appears
    if (btnEl) btnEl.parentElement.querySelectorAll("button").forEach(b => b.disabled = true);
    setLoading(true, action === "approve" ? "正在核准…" : "正在拒絕…");
    try {
      const data = await apiPost("/liff/makeup/review", {
        id_token: idToken,
        request_id: id,
        action,
      });
      setLoading(false);
      // Remove the reviewed card
      document.getElementById(`review-card-${id}`)?.remove();
      toast(`${SVG_OK} ${esc(data.message)}`);
      if (!document.querySelector(".review-card")) {
        document.getElementById("review-list").innerHTML =
          '<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:0 auto 12px;opacity:.6"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-5"/></svg>目前沒有待審核的申請</div>';
      }
      // Decrement badge
      const badge = document.getElementById("pending-badge");
      const n = parseInt(badge.textContent || "0") - 1;
      if (n <= 0) { badge.style.display = "none"; }
      else        { badge.textContent = n; }
    } catch (e) {
      setLoading(false);
      toast(`${SVG_ERR} ${esc(e.detail||"操作失敗，請重試")}`, 3500);
    }
  }

  // ── API helper ─────────────────────────────────────────────
  async function apiPost(path, body) {
    // Always fetch the freshest LIFF ID token — prevents 401s when the
    // app stays open longer than the token's 1-hour lifetime.
    if ("id_token" in body) body = { ...body, id_token: liff.getIDToken() };
    const resp = await fetch(API_BASE + path, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    const data = await resp.json();
    if (!resp.ok) throw { status: resp.status, detail: data.detail };
    return data;
  }

  // ── Toast ──────────────────────────────────────────────────
  function toast(msg, duration = 2500) {
    const el = document.getElementById("toast");
    el.innerHTML = msg;
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), duration);
  }

  // ── Loading overlay ────────────────────────────────────────
  function setLoading(on, msg = "") {
    const el = document.getElementById("loading-overlay");
    el.style.display = on ? "flex" : "none";
    if (msg) document.getElementById("loading-msg").textContent = msg;
  }

  // ── Status refresh ─────────────────────────────────────────
  async function refreshStatus() {
    try {
      const data = await apiPost("/liff/status", { id_token: idToken });
      document.getElementById("dt-user").innerHTML =
        `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:5px;opacity:.7"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${esc(data.display_name)}`;

      if (data.clock_in_time) {
        document.getElementById("in-time").textContent = data.clock_in_time;
        document.getElementById("btn-in").classList.add("done");
        const [h, m] = data.clock_in_time.split(":").map(Number);
        _clockInTimestamp = new Date();
        // Seconds zeroed — API returns HH:MM only, so warning threshold is intentionally
        // conservative (fires up to 59s early). Server record is unaffected.
        _clockInTimestamp.setHours(h, m, 0, 0);
        // Guard: if the reconstructed time is in the future (e.g. punched in near midnight
        // and LIFF opened just after midnight), roll back one day so worked-minutes is positive.
        if (_clockInTimestamp > new Date()) {
          _clockInTimestamp.setDate(_clockInTimestamp.getDate() - 1);
        }
      }
      if (data.clock_out_time) {
        document.getElementById("out-time").textContent = data.clock_out_time;
        document.getElementById("btn-out").classList.add("done");
      }

      isManager = !!data.is_manager;
      if (isManager) {
        document.getElementById("manager-section").style.display = "block";
        const count = data.pending_makeup_count || 0;
        const badge = document.getElementById("pending-badge");
        if (count > 0) {
          badge.textContent = count;
          badge.style.display = "inline-block";
        }
      }

      _cardNumber = data.card_number || null;
      if (!_cardNumber) {
        document.getElementById("card-badge").style.display = "inline-block";
      }
    } catch (e) {
      console.error("refreshStatus failed:", e);
      toast(`${SVG_WARN} 狀態載入失敗，請重新整理`, 4000);
    }
  }

  // ── Confirm dialog ─────────────────────────────────────────
  function showConfirm(msg, okLabel = "確定") {
    return new Promise(resolve => {
      document.getElementById("confirm-msg").textContent = msg;
      document.getElementById("confirm-ok").textContent = okLabel;
      document.getElementById("confirm-overlay").style.display = "flex";
      document.getElementById("confirm-ok").onclick = () => {
        document.getElementById("confirm-overlay").style.display = "none";
        resolve(true);
      };
      document.getElementById("confirm-cancel").onclick = () => {
        document.getElementById("confirm-overlay").style.display = "none";
        resolve(false);
      };
    });
  }

  // ── Punch ──────────────────────────────────────────────────
  async function doPunch(type) {
    if (type === "clock_out" && _clockInTimestamp) {
      const workedMinutes = (new Date() - _clockInTimestamp) / 60000;
      if (workedMinutes < 480) {
        const h = Math.floor(workedMinutes / 60);
        const m = Math.floor(workedMinutes % 60);
        const label = h > 0 ? `${h} 小時 ${m} 分` : `${m} 分`;
        const ok = await showConfirm(`目前上班時數僅 ${label}，未滿 8 小時，確定要下班打卡？`, "確定下班");
        if (!ok) return;
      }
    }
    setLoading(true, "正在取得位置資訊…");
    let position;
    try {
      position = await new Promise((resolve, reject) =>
        navigator.geolocation.getCurrentPosition(resolve, reject,
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 })
      );
    } catch {
      setLoading(false);
      toast(`${SVG_ERR} 無法取得定位，請確認已開啟定位權限`);
      return;
    }

    setLoading(true, "正在送出打卡資料…");
    try {
      const data = await apiPost("/liff/checkin", {
        type,
        latitude:  position.coords.latitude,
        longitude: position.coords.longitude,
        id_token:  idToken,
      });
      setLoading(false);
      if (type === "clock_in") {
        document.getElementById("in-time").textContent = data.time;
        document.getElementById("btn-in").classList.add("done");
        _clockInTimestamp = new Date();
      } else {
        document.getElementById("out-time").textContent = data.time;
        document.getElementById("btn-out").classList.add("done");
      }
      toast(`${SVG_OK} ${esc(data.message)}`);
    } catch (e) {
      setLoading(false);
      const msg =
        e.status === 409 ? "⚠️ 2 小時內已打卡，請勿重複操作" :
        e.status === 422 ? "⚠️ 今日尚未上班打卡，請先打上班" :
        e.status === 403 ? "❌ 帳號未綁定，請先完成 Email 綁定" :
        "❌ 打卡失敗，請重試";
      toast(msg, 3500);
    }
  }

  // ── Profile / card number ──────────────────────────────────
  function showProfile() {
    document.getElementById("profile-name").textContent =
      document.getElementById("dt-user").textContent.trim() || "—";
    document.getElementById("profile-card").value = _cardNumber || "";
    showScreen("screen-profile", "個人資料", true);
  }

  async function submitCardNumber() {
    const raw = document.getElementById("profile-card").value.trim().toUpperCase();
    if (!raw) { toast(`${SVG_WARN} 請輸入卡號`); return; }
    if (!/^[0-9A-Z]{8}$/.test(raw)) { toast(`${SVG_WARN} 卡號須為 8 碼英數字`); return; } // keep in sync with CARD_NUMBER_RE in app/models/employee.py

    const btn = document.getElementById("card-save-btn");
    if (btn.disabled) return;
    btn.disabled = true;
    setLoading(true, "儲存中…");
    try {
      const data = await apiPost("/liff/update_card", {
        id_token: idToken,
        card_number: raw,
      });
      setLoading(false);
      btn.disabled = false;
      _cardNumber = data.card_number;
      document.getElementById("card-badge").style.display = "none";
      toast(`${SVG_OK} 卡號已儲存：${esc(data.card_number)}`);
      goBack();
    } catch (e) {
      setLoading(false);
      btn.disabled = false;
      toast(`${SVG_ERR} ${esc(e.detail || "儲存失敗，請重試")}`, 3500);
    }
  }

  // ── LIFF init ──────────────────────────────────────────────
  liff.init({ liffId: LIFF_ID })
    .then(() => {
      if (!liff.isLoggedIn()) { liff.login(); return; }
      idToken = liff.getIDToken();
      refreshStatus();
    })
    .catch(() => {
      document.getElementById("dt-user").textContent = "LIFF 初始化失敗";
    });
</script>
</body>
